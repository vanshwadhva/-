<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onboarding</title>
    <link rel="icon" type="image/png" href="2.png" sizes="32x32">

    <style>
        tailwind.config= {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'Noto Sans', 'sans-serif', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji'],
                            calibri: ['Calibri', 'sans-serif'],
                    }

                    ,
                }
            }
        }

        /* Styles for the iframe container */
        .iframe-container {
            width: 100%;
            height: calc(100vh - 120px);
            /* Adjust height to fit between header and footer */
            overflow: hidden;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            background-color: #fefefe;
        }

        .iframe-container iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Responsive adjustments for header and nav */
        @media (max-width: 768px) {
            .container {
                width: 95%;
                padding: 10px;
            }

            .header-nav-items {
                flex-direction: column;
                align-items: center;
                gap: 10px;
            }

            .header-right-group {
                margin-left: auto;
                display: flex;
                align-items: center;
            }

            .iframe-container {
                height: calc(100vh - 160px);
                /* Adjust for smaller header/footer on mobile */
            }

<body class="font-sans text-gray-800 flex flex-col min-h-screen">

    <!-- Google Tag Manager (noscript) -->
    <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-N89XZGM4" height="0" width="0"
            style="display:none;visibility:hidden"></iframe></noscript>
    <!-- End Google Tag Manager (noscript) -->

    <!-- Header Section -->
    <header class="fixed top-0 left-0 right-0 z-50 bg-white bg-opacity-80 backdrop-blur-md py-4 shadow-sm">
        <div class="container mx-auto flex items-center justify-start px-4 md:px-6">
            <a href="https://svashasan.com" class="flex-shrink-0">
                <img src="2.png" alt="Svashasan Logo" class="h-10 w-auto object-contain">
            </a>
        </div>
    </header>

    <main class="flex-grow pt-[72px] flex flex-col w-full h-[calc(100vh-100px)]">
        <iframe src="https://svashasan-onboarding.netlify.app" loading="lazy"
            class="w-full flex-grow border-none"></iframe>
    </main>

    <!-- Footer -->
    <footer class="mt-auto py-8 border-t border-gray-100">
        <div class="container mx-auto px-6 flex justify-center space-x-6 text-xs text-gray-500">
            <a href="#" class="hover:underline">Svashasan &copy; 2026</a>
            <a href="#" class="hover:underline">Privacy & Legal</a>
            <a href="#" class="hover:underline">Vehicle Recalls</a>
            <a href="#" class="hover:underline">Contact</a>
        </div>
    </footer>


    <!-- QR Login Modal Overlay -->
    <div id="qr-modal"
        class="hidden fixed inset-0 z-[100] bg-black bg-opacity-60 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center relative">
            <button id="close-qr" class="absolute top-4 right-4 text-gray-400 hover:text-gray-800 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
            <h2 class="text-2xl font-bold text-gray-800 mb-2">Desktop Login</h2>
            <p class="text-gray-600 mb-6 text-sm">Scan this QR code with your phone's native camera to securely log in.
            </p>

            <div class="flex justify-center mb-6">
                <!-- QR Code Display -->
                <img id="qr-image" src="" alt="Scan to Login"
                    class="w-48 h-48 object-contain hidden border rounded-xl p-2 shadow-sm" />
                <!-- Loader while fetching -->
                <div id="qr-loader"
                    class="w-48 h-48 flex items-center justify-center border-2 border-dashed border-gray-300 rounded-xl">
                    <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
                </div>
            </div>

            <p id="qr-status-text" class="text-blue-600 font-medium animate-pulse text-sm">Generating secure code...</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Consistent device detection (matches profile.html router)
            const isMobile = window.matchMedia("(max-width: 767px)").matches;

            if (!isMobile) {
                // Desktop users → login only
                window.location.replace("https://svashasan.com/login");
                return;
            }

            const menuButton = document.getElementById('menu-button');
            const mobileMenu = document.getElementById('mobile-menu');

            if (menuButton && mobileMenu) {
                menuButton.addEventListener('click', () => {
                    mobileMenu.classList.toggle('hidden');
                });
                mobileMenu.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        mobileMenu.classList.add('hidden');
                    });
                });
            }

            // QR Modal Logic for Profile Icon
            let qrPollInterval = null;
            const qrModal = document.getElementById('qr-modal');
            const closeQr = document.getElementById('close-qr');
            const qrImage = document.getElementById('qr-image');
            const qrLoader = document.getElementById('qr-loader');
            const qrStatusText = document.getElementById('qr-status-text');

            async function openQRLogin() {
                // If user already logged in desktop, just redirect to my-account
                if (localStorage.getItem("svashasan_token")) {
                    window.location.href = "https://svashasan.com/my-account";
                    return;
                }

                qrModal.classList.remove('hidden');
                qrImage.classList.add('hidden');
                qrLoader.classList.remove('hidden');
                qrStatusText.textContent = "Generating secure code...";
                qrStatusText.className = "text-blue-600 font-medium animate-pulse text-sm";

                try {
                    const res = await fetch("https://svashasan-auth-production.up.railway.app/qr-session", { method: 'POST' });
                    const data = await res.json();
                    const session_id = data.session_id;

                    const qrUrl = `https://svashasan.com/qr.html?session_id=${session_id}`;
                    // Use a generic open QR API service
                    qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(qrUrl)}`;

                    qrImage.onload = () => {
                        qrImage.classList.remove('hidden');
                        qrLoader.classList.add('hidden');
                        qrStatusText.textContent = "Waiting for phone scan...";
                    };

                    // Poll for authorization status
                    qrPollInterval = setInterval(async () => {
                        try {
                            const statusRes = await fetch(`https://svashasan-auth-production.up.railway.app/qr-status/${session_id}`);
                            const status = await statusRes.json();
                            if (status.authenticated && status.token) {
                                clearInterval(qrPollInterval);
                                qrStatusText.textContent = "Success! Redirecting...";
                                qrStatusText.className = "text-green-600 font-bold text-sm";
                                localStorage.setItem("svashasan_token", status.token);
                                setTimeout(() => {
                                    window.location.href = "https://svashasan.com/my-account";
                                }, 1000);
                            }
                        } catch (e) {
                            console.error("Polling check failed", e);
                        }
                    }, 2000);
                } catch (e) {
                    qrStatusText.textContent = "Failed to load code. Try again.";
                    qrStatusText.className = "text-red-600 font-medium text-sm";
                }
            }

            closeQr.addEventListener('click', () => {
                qrModal.classList.add('hidden');
                if (qrPollInterval) clearInterval(qrPollInterval);
            });

            const profileIcon = document.getElementById('profile-icon');
            if (profileIcon) {
                profileIcon.addEventListener('click', (e) => {
                    e.preventDefault();
                    openQRLogin();
                });
            }
        });
    </script>
</body>

</html>
