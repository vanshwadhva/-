<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
</head>
<body>
    <script>
        const isMobile = window.matchMedia("(max-width: 767px)").matches;

        if (isMobile) {
            window.location.replace("https://svashasan.com/login");
        } else {
            window.location.replace("https://svashasan.com/onboarding");
        }
    </script>
</body>
</html>
